<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Khám Phá Cần Thơ</title>
    <link rel="stylesheet" href="page.css">
</head>
<body>
    <section>
        <h2>Đăng ký nhận tư vấn du lịch Cần Thơ</h2>
        <p>Điền thông tin bên dưới để nhận gợi ý lịch trình phù hợp theo sở thích cá nhân.</p>

        <form class="form-box">
            <div class="form-group">
                <label for="name">Họ và tên</label>
                <input id="name" name="name" type="text" placeholder="Nhập họ và tên" required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input id="phone" name="phone" type="tel" placeholder="Nhập số điện thoại" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="Nhập email" required>
            </div>

            <button type="submit">Gửi đăng ký</button>
        </form>
    </section>
</body>
</html>
